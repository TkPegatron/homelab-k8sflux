---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:

    controllers:
      main:
        type: deployment
        containers:
          main:
            image:
              repository: ghcr.io/dani-garcia/vaultwarden
              tag: 1.35.4-alpine@sha256:34b4e91ed4c2a4d2191245325608b2a84bedbeb9c9dd561e3c0924b98ef7126c
            env:
              TZ: America/Detroit
              SIGNUPS_ALLOWED: "false"
              SHOW_PASSWORD_HINT: "false"
              DOMAIN: https://vault.zynthovian.xyz
              ADMIN_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-secret
                    key: admin-token

    persistence:
      data:
        enabled: true
        existingClaim: vaultwarden
        globalMounts:
          - path: '/data'

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: true
        className: nginx-internal
        annotations:
          gethomepage.dev/name: "Vaultwarden"
          gethomepage.dev/group: "Apps"
          gethomepage.dev/icon: vaultwarden.png
          gethomepage.dev/enabled: "true"
          external-dns.alpha.kubernetes.io/target: nginx-internal.zynthovian.xyz
        hosts:
          - host: &host "{{ .Release.Name }}.zynthovian.xyz"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
        tls:
          - hosts:
              - *host
